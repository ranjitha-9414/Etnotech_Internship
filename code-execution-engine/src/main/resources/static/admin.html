<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg,#0f172a,#1e293b);
            color: white;
        }

        nav {
            padding: 15px;
            background: #020617;
            text-align: center;
        }

        nav h2 {
            margin: 0;
            color: #38bdf8;
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin: 30px auto;
        }

        h1 {
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: none;
            background: #020617;
            color: white;
        }

        textarea {
            height: 90px;
        }

        button {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: linear-gradient(90deg,#3b82f6,#06b6d4);
            color: white;
            cursor: pointer;
        }

        table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border-bottom: 1px solid #334155;
        }

        .actions button {
            padding: 4px 8px;
            font-size: 12px;
            margin-right: 4px;
        }

        .delete-btn {
            background: red;
        }

        /* 📱 Mobile */
        @media (max-width: 600px) {
            table {
                display: block;
                overflow-x: auto;
                white-space: nowrap;
            }
        }
    </style>
</head>

<body>

<nav>
    <h2>⚙️ Admin Panel</h2>
</nav>

<div class="container">

    <h1>Admin Dashboard</h1>

    <!-- ADD / EDIT -->
    <div class="card">
        <h3>Add / Edit Problem</h3>

        <input id="title" placeholder="Title">
        <textarea id="description" placeholder="Description"></textarea>

        <button onclick="addProblem()">Save Problem</button>

        <p id="problemMsg"></p>
    </div>

    <!-- PROBLEM LIST -->
    <div class="card">
        <h3>Problem List</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="problemTable"></tbody>
        </table>
    </div>

    <!-- TEST CASE -->
    <div class="card">
        <h3>Add Test Case</h3>

        <input id="problemId" placeholder="Problem ID">
        <textarea id="input" placeholder="Input"></textarea>
        <textarea id="output" placeholder="Expected Output"></textarea>

        <label>
            <input type="checkbox" id="isSample"> Sample Test Case
        </label>

        <button onclick="addTestCase()">Add Test Case</button>

        <p id="testMsg"></p>
    </div>

</div>

<script src="admin.js"></script>

</body>
</html>
