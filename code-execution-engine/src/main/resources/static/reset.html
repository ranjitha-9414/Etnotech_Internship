<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        h2 {
            margin-bottom: 20px;
            color: white;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .input-box span {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16a34a;
        }

        .msg {
            margin-top: 15px;
            font-size: 14px;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔐 Reset Password</h2>

    <div class="input-box">
        <input type="password" id="newPass" placeholder="Enter new password">
        <span onclick="togglePassword('newPass', this)">👁️</span>
    </div>

    <div class="input-box">
        <input type="password" id="confirmPass" placeholder="Confirm password">
        <span onclick="togglePassword('confirmPass', this)">👁️</span>
    </div>

    <button onclick="resetPassword()">Reset Password</button>

    <div class="msg" id="msg"></div>
</div>

<script>
function togglePassword(id, icon) {

    let input = document.getElementById(id);

    if (input.type === "password") {
        input.type = "text";
        icon.innerText = "🙈";
    } else {
        input.type = "password";
        icon.innerText = "👁️";
    }
}

function resetPassword() {

    let params = new URLSearchParams(window.location.search);
    let token = params.get("token");

    let pass = document.getElementById("newPass").value;
    let confirm = document.getElementById("confirmPass").value;

    if (!pass || !confirm) {
        showMsg("Please fill all fields ❌", "red");
        return;
    }

    if (pass !== confirm) {
        showMsg("Passwords do not match ❌", "red");
        return;
    }

    fetch("/api/auth/reset-password", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            token: token,
            password: pass
        })
    })
    .then(res => res.text())
    .then(msg => {
        showMsg(msg, "lightgreen");

        setTimeout(() => {
            window.location.href = "login.html";
        }, 2000);
    })
    .catch(() => showMsg("Error resetting password ❌", "red"));
}

function showMsg(message, color) {
    let msgDiv = document.getElementById("msg");
    msgDiv.innerText = message;
    msgDiv.style.color = color;
}
</script>

</body>
</html>
